name: Bootstrap Environment Terraform

on:
  pull_request:
    paths:
      - "bootstrap/**"
      - ".github/workflows/bootstrap-terraform.yml"
  push:
    branches:
      - main
    paths:
      - "bootstrap/**"
      - ".github/workflows/bootstrap-terraform.yml"
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Bootstrap environment to run"
        required: true
        type: choice
        default: dev
        options:
          - dev
          - prod
      action:
        description: "Run plan only, or plan and apply"
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-1
  TF_IN_AUTOMATION: "true"
  TF_VERSION: 1.15.7

concurrency:
  group: bootstrap-${{ github.event.inputs.target_environment || 'dev' }}
  cancel-in-progress: false

jobs:
  validate:
    name: Format and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive bootstrap

      - name: Validate bootstrap environment modules
        run: |
          for dir in bootstrap/envs/*; do
            [ -d "$dir" ] || continue
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
          done

  plan:
    name: Plan bootstrap environment
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')
    environment: bootstrap-${{ github.event.inputs.target_environment || 'dev' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-bootstrap-${{ github.event.inputs.target_environment || 'dev' }}

      - name: Check remote backend
        run: |
          backend_file=bootstrap/envs/${{ github.event.inputs.target_environment || 'dev' }}/backend.tf
          if ! grep -Eq '^[[:space:]]*backend[[:space:]]+"s3"' "$backend_file"; then
            echo "::error::S3 backend is not enabled in $backend_file"
            exit 1
          fi

      - name: Terraform init
        run: terraform -chdir=bootstrap/envs/${{ github.event.inputs.target_environment || 'dev' }} init -input=false

      - name: Terraform plan
        run: terraform -chdir=bootstrap/envs/${{ github.event.inputs.target_environment || 'dev' }} plan -input=false -no-color

  apply:
    name: Apply bootstrap environment
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
    environment: bootstrap-${{ github.event.inputs.target_environment || 'dev' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-bootstrap-${{ github.event.inputs.target_environment || 'dev' }}

      - name: Check remote backend
        run: |
          backend_file=bootstrap/envs/${{ github.event.inputs.target_environment || 'dev' }}/backend.tf
          if ! grep -Eq '^[[:space:]]*backend[[:space:]]+"s3"' "$backend_file"; then
            echo "::error::S3 backend is not enabled in $backend_file"
            exit 1
          fi

      - name: Terraform init
        run: terraform -chdir=bootstrap/envs/${{ github.event.inputs.target_environment || 'dev' }} init -input=false

      - name: Terraform plan
        run: terraform -chdir=bootstrap/envs/${{ github.event.inputs.target_environment || 'dev' }} plan -input=false -no-color -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=bootstrap/envs/${{ github.event.inputs.target_environment || 'dev' }} apply -input=false -auto-approve tfplan
